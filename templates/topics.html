<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tópicos - Sistema de Resoluções</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <main class="content" style="max-width: 800px; margin: 0 auto;">
            <h1>📚 Tópicos de Estudo</h1>
            <hr>
            <a href="{{ url_for('topic.novo_topic') }}" class="button" style="display: inline-block; margin-bottom: 20px;">➕ Criar Novo Tópico</a>
            {% if topicos %}
                <ul style="list-style: none; padding: 0;">
                {% for topic in topicos %}
                    <li style="margin-bottom: 10px;">
                        <a href="{{ url_for('topic.ver_topic', topic_name=topic) }}" class="button" style="display: block; text-align: left;">
                            📁 {{ topic }}
                        </a>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p>Nenhum tópico criado ainda. Crie um para começar!</p>
            {% endif %}
        </main>
    </div>
</body>
</html>
